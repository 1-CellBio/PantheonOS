# Knowledge Base configuration file
# This config file defines default settings for the knowledge base, overridable via environment variables

knowledge:
  # Storage path (metadata, indexes, etc.)
  storage_path: "~/.pantheon-knowledge"

  # Qdrant vector database configuration
  qdrant:
    # location: Qdrant storage location
    #   - ":memory:" : In-memory mode (no persistence, for testing)
    #   - local path : Persist to local file (e.g. "./qdrant_data")
    #   - URL : Connect to remote Qdrant server (e.g. "http://localhost:6333")
    # Environment variable override: QDRANT_LOCATION
    location: "${storage_path}/qdrant_storage"

    # path: Local file storage path (only used when location is local path; deprecated, use location instead)
    # Environment variable override: QDRANT_PATH
    path: null

    # api_key: Qdrant server API key (remote mode only)
    # Environment variable override: QDRANT_API_KEY
    api_key: null

    # prefer_grpc: Whether to use gRPC (remote mode only)
    # Environment variable override: QDRANT_PREFER_GRPC
    prefer_grpc: false

  # Embedding model configuration
  embedding:
    model: "text-embedding-3-large"
    dimension: 3072
    batch_size: 100
    parallel: 4  # Number of parallel upload processes, speeds up bulk index building
    max_retries: 3

  # Document chunking configuration
  chunking:
    buffer_size: 1
    breakpoint_percentile: 95

  # Retrieval configuration
  retrieval:
    use_hybrid: true
    sparse_top_k: 12
    use_rerank: true
    rerank_model: "ms-marco-MiniLM-L-12-v2"
    rerank_top_n: 5

  # Metadata configuration
  metadata:
    path: "${storage_path}/metadata.json"
    extract_fields: ["title", "author", "created_at", "doc_type", "page_count"]
    extract_title: false
    extract_keywords: false
    extract_summary: false

  # Incremental update configuration
  incremental:
    enabled: true
    hash_algorithm: "sha256"
