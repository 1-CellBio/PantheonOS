name: Tests

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false

    services:
      nats:
        image: nats:latest
        ports:
          - 4222:4222
          - 8080:8080
          - 8222:8222
        options: >-
          --health-cmd "nats-server -version"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}-
          ${{ runner.os }}-pip-

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libssl-dev

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -e ".[dev]"

    - name: Verify NATS server connectivity
      run: |
        sleep 5  # Give NATS time to fully start
        python -c "
        import socket
        import time
        max_retries = 10
        for i in range(max_retries):
          try:
            sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
            sock.settimeout(2)
            result = sock.connect_ex(('localhost', 4222))
            sock.close()
            if result == 0:
              print('✓ NATS server is accessible on port 4222')
              exit(0)
          except:
            pass
          time.sleep(1)
        print('✗ Failed to connect to NATS server')
        exit(1)
        "

    - name: Run core tests (no API/remote required)
      run: |
        pytest -v tests/ \
          -k "not api and not nats_streaming and not reverse_call" \
          --tb=short \
          --co -q || true

        pytest -v tests/ \
          -k "not api and not nats_streaming and not reverse_call" \
          --tb=short

    - name: Run NATS-dependent tests
      if: always()
      env:
        # Override NATS_SERVERS for GitHub Actions (conftest.py will use this if set)
        NATS_SERVERS: "nats://localhost:4222"
      run: |
        pytest -v tests/test_nats_streaming.py tests/test_reverse_call.py \
          --tb=short || true

    - name: Run tests requiring API keys (if available)
      if: always() && secrets.OPENAI_API_KEY != ''
      env:
        # Set API key from GitHub Secrets (takes priority over .env)
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        # Override NATS_SERVERS for GitHub Actions
        NATS_SERVERS: "nats://localhost:4222"
      run: |
        pytest -v tests/test_agent.py tests/test_knowledge.py \
          -k "api" \
          --tb=short || true

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-py${{ matrix.python-version }}
        path: |
          .pytest_cache/
          tests/__pycache__/
        retention-days: 5
